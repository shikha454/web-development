<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet "
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-primary">
    <div class="d-flex align-item-end justify-content-center vh-100 pb-5 gap-5">
      <div
        class="bg-light d-grid gap-4 p-4 align-item-center justify-content-center rounderd-2 w-25 me-25 mb-5"
      >
        <h1 class="mb-3">
          <span class="bg-light text-decoration-underline link-underline-primary">lo</span>gin</h1>

        <div class="d-flex gap-2 align-item-center border-bottom border-2 w-100">
          <i class="bi bi-envelope"></i>
          <input
            type="email"
            name="email"
            id=" loginemail"
            placeholder="Enter your email"
            class="border-0 bg-light w-100"
            style="outline: none;"
          />
        </div>
        <div class="d-flex gap-2 align-item-center border-bottom border-2 w-100">
          <i class="bi bi-lock"></i>
          <input
            type="password"
            name="password"
            id="loginPassword"
            placeholder="Password"
            class="border-0 bg-light w-100"
          />
          <i class="bi bi-eye"></i>
        </div>
        <div class="d-flex gap-5 justify-content-center w-100">
          <label> <input type="checkbox" />Remember Me</label>
          <a href="#">Forget Password?</a>
        </div>

        <div class="d-flex gap-2 align-item-center border-bottom border-2 w-100">
          <button class="bg-primary border rounded-2 w-100 text-light p-2">
            Login Now
          </button>
        </div>
        <div class="d-flex gap-1 justify-content-center w-100">
          <p>Don't Have Account? <a href="#">Signup Now</a></p>
        </div>
      </div>

      <div class="bg-light d-grid gap-4 p-4 align-item-center justify-content-center rounderd-2 w-25 me-25 mb-5">
        <h1><span class="text-decoration-underline">Re</span>gister</h1>

        <div class="d-flex gap-2 align-item-center border-bottom border-2 w-100">
          <i class="bi bi-person"></i>
          <input
            class="border-0 bg-light w-100"
            type="text"
            name="fullName"
            id="registerFullName"
            placeholder="Name"
          />
        </div>

        <div class="d-flex gap-2 align-item-center border-bottom border-2 w-100">
          <i class="bi bi-envelope"></i>
          <input
            class="border-0 bg-light w-100"
            type="email"
            name="email"
            id="registerEmail"
            placeholder="Email"
          />
        </div>
        <div class="d-flex gap-2 align-item-center border-bottom border-2 w-100">
          <i class="bi bi-lock"></i>
          <input
            class="border-0 bg-light w-100"
            type="password"
            name="create_password"
            id="registerCreatePassword"
            placeholder="Create Password"
          />
        </div>
        <div class="d-flex gap-2 align-item-center border-bottom border-2 w-100">
          <i class="bi bi-lock"></i>
          <input
            class="border-0 bg-light w-100"
            type="password"
            name="confirm_password"
            id="registerConfirmPassword"
            placeholder="Confirm Password"
          />
          <i class="bi bi-eye"></i>
        </div>

        <div class="d-flex gap-5 justify-content-center w-100">
          <label>
            <input type="checkbox" /> I agree all Terms and Condition
          </label>
        </div>

        <div class="">
          <button class="bg-primary border border-bottom rounded-2">Register Now</button>
        </div>

        <div class="">
          <p>Already Have Account? <a href="#">Login Now</a></p>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>

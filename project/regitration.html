<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet "
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
</head>
<body>
 <div
        class="bg-light d-grid gap-4 p-4 align-items-center justify-content-center rounded-3 w-auto mb-5"
      >
        <h3 class="text-center">
          <span
            class="bg-light fs-1 fw-bold text-primary text-center" >
            Create Account
        </h3>
        <div class="text-center text-body-teritary">
          <span>Join as a Customer, Restaurant, or Rider</span>
        </div>
        <div
          class="d-flex gap-2 align-items-center border-bottom border-2 w-100"
        >
          
          <input
            type="text"
            placeholder="Enter your name "
            class="border-0 bg-light w-100"
            style="outline: none"
          />
        </div>
        <div
          class="d-flex gap-2 align-items-center border-bottom border-2 w-100"
        >
          
          <input
            type="email"
            placeholder="Enter your email "
            class="border-0 bg-light w-100"
            style="outline: none"
          />
        </div>
        <div
          class="d-flex gap-2 align-items-center border-bottom border-2 w-100"
        >
          
          <input
            type="password"
            placeholder="Create a password"
            class="border-0 bg-light w-100"
            style="outline: none"
          />
        </div>
        <div
          class="d-flex gap-5 align-items-center border-bottom border-2 w-100"
        >
          <div class="d-flex gap-2">
           
            <input
              type="password"
              placeholder="Confirm a password"
              class="border-0 bg-light w-100 pe-5"
              style="outline: none"
            />
          </div>
         
        </div>
        <div
          class="d-flex align-items-center justify-content-between gap-5 w-100"
        >
          <div class="d-flex align-items-center gap-2">
            <input type="checkbox" /><span
              >i accept all terms and conditions</span
            >
          </div>
        </div>
        <div class="d-flex align-items-center justify-content-center">
          <button class="bg-primary border rounded-2 w-100 text-light p-2">
            Register now
          </button>
        </div>
        <div class="d-flex gap-1 justify-content-center mb-3">
          <span>already have an account? </span>
          <a class="text-decoration-none" href=""> Login now</a>
        </div>
      </div>
    </div>







    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    
</body>
</html>

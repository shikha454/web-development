<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet "
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    
</head>
<body>
    <div
        class="bg-light d-grid gap-4 p-4 align-items-center justify-content-center rounded-3 w-auto me-5 mb-5"
      >
        <h3 class=" text-center">
          <span class="bg-light fs-1 fw-bold text-primary text-center" >
            Welcome Back
        </h3>
        <div class="text-center text-body-teritary">
          <p>Login to your Cravings account </p>
        </div>
        <div
          class="d-flex gap-2 align-items-center border-bottom border-2 w-100"
        >
          <i class="bi bi-envelope"></i>
          <input
            type="email"
            placeholder="Enter your email "
            class="border-0 bg-light w-100"
            style="outline: none"
          />
        </div>
        <div
          class="d-flex gap-2 align-items-center border-bottom border-2 w-100"
        >
          <i class="bi bi-lock"></i
          ><input
            type="password"
            placeholder="Enter a password"
            class="border-0 bg-light w-100"
            style="outline: none"
          /><i class="bi bi-eye"></i>
        </div>
        <div
          class="d-flex align-items-center justify-content-between gap-5 w-100"
        >
          <div class="d-flex align-items-center gap-2">
            <input type="checkbox" /><span>Remember me</span>
          </div>
          <div class="text-primary">
            <a class="text-decoration-none" href="">Forgot password?</a>
          </div>
        </div>
        <div class="d-flex align-items-center justify-content-center w-100">
          <button class="bg-primary border rounded-2 w-100 text-light p-2">
            Login now
          </button>
        </div>
        <div class="d-flex gap-1 justify-content-center mb-3">
          <span>Don't have an account? </span>
          
        </div>
        <div class="text-center text-">
          <p>Create an account</p>
        </div>
      </div>







    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
</body>
</html>

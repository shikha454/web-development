<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="div1">
        <p>this is box</p>
    </div>
    <div id="div2">
        <p>this is paragraph</p>
    </div>
    <div class="div3">
        <p>this is pen</p>
    </div>
    <hr>
     <div class="First-container">
        <h1>Before Display Inline</h1>
        <div class="First-div">Hii I Am First Div</div>
        <div class="Second-div">Hii I Am Second Div</div>
    </div>

    <div class="Second-container">
        <h1>After Display Inline</h1>
        <div class="First-div">Hii I Am First Div</div>
        <div class="Second-div">Hii I Am Second Div</div>
    </div>
    <hr>
     <h1>Inline-Block</h1>
    
    <div class="nav-container">
        <div class="box">Home</div>
        <div class="box">About</div>
        <div class="box">Services</div>
        <div class="box">Contact</div>
    </div>
    <hr>
    <div class="container">
        <div class="box visible">Box 1 (Visible)</div>
        
        <div class="box hidden">Box 2 (display: none)</div>
        
        <div class="box visible">Box 3 (Visible)</div>
    </div>
</body>
</html>
